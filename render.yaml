# render.yaml — конфигурация деплоя на Render.com
# Документация: https://render.com/docs/blueprint-spec

services:
  - type: worker
    name: nailstory-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: OWNER_ID
        sync: false
      - key: SUPABASE_ACCESS_TOKEN
        sync: false
